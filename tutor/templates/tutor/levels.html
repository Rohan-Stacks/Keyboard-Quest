<!-- I made the level selection page, and I will connect the
level pages to it. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose a Level</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'tutor/style.css' %}">
    <link rel="stylesheet" href="{% static 'tutor/difficulty.css' %}">
</head>
<body>
    <main class="page">
        <h1>Keyboard Quest</h1>
        <!-- Added back button for easier nav -->
        <a href="{% url 'home' %}" class="back-link">Back to Home</a>

        <section class="level-grid">
            {% for level in levels %}
                <a
                    href="{% url 'level_page' level.number %}"
                    data-level="{{ level.number }}"
                    data-play-url="{% url 'level_page' level.number %}"
                    data-done-url="{% url 'level_complete' level.number %}"
                    class="level-box level-locked {% if level.number == 10 %}level-10{% endif %} level-pick"
                >
                    <span>{{ level.number }}</span>
                </a>
            {% endfor %}
        </section>

        <section class="level-card difficulty-picker">
            <p class="eyebrow">Difficulty</p>
            <div class="difficulty-options">
                <button type="button" class="back-link difficulty-btn" data-difficulty="easy">Easy</button>
                <button type="button" class="back-link difficulty-btn" data-difficulty="medium">Medium</button>
                <button type="button" class="back-link difficulty-btn" data-difficulty="hard">Hard</button>
            </div>
            <p class="difficulty-hint" id="difficultyHint"></p>
        </section>
    </main>

<!-- here I got the player's progress and worked out which level should be available next. -->

<script src="{% static 'tutor/difficulty.js' %}"></script>
<script>
    var difficultyHint = document.getElementById("difficultyHint");
    var difficultyButtons = document.querySelectorAll(".difficulty-btn");

    function updateDifficultyHint() {
        difficultyHint.textContent = "Pass with " + formatPassRules();
    }

    function updateDifficultyButtons() {
        var current = getDifficulty();
        for (var i = 0; i < difficultyButtons.length; i++) {
            var btn = difficultyButtons[i];
            if (btn.getAttribute("data-difficulty") === current) {
                btn.classList.add("active");
            } else {
                btn.classList.remove("active");
            }
        }
    }

    function refreshLevelGrid() {
        var passed = getPassedLevels();
        var openLevel = nextOpenLevel();
        var picks = document.querySelectorAll(".level-pick");

        for (var i = 0; i < picks.length; i++) {
            var link = picks[i];
            var num = parseInt(link.getAttribute("data-level"), 10);
            var pending = sessionStorage.getItem(getResultKey(num));
            var playUrl = link.getAttribute("data-play-url");
            var doneUrl = link.getAttribute("data-done-url");

            link.classList.remove("level-completed", "level-current", "level-locked");

            if (passed.indexOf(num) !== -1) {
                link.classList.add("level-completed");
                if (pending) {
                    link.setAttribute("href", doneUrl);
                } else {
                    link.setAttribute("href", playUrl);
                }
            } else if (num === openLevel && num <= 10) {
                link.classList.add("level-current");
                if (pending) {
                    link.setAttribute("href", doneUrl);
                } else {
                    link.setAttribute("href", playUrl);
                }
            } else {
                link.classList.add("level-locked");
                link.removeAttribute("href");
            }
        }
    }

    // I refresh the level grid when the user switches difficulty so each mode keeps its own progress.
    for (var b = 0; b < difficultyButtons.length; b++) {
        difficultyButtons[b].addEventListener("click", function () {
            setDifficulty(this.getAttribute("data-difficulty"));
            updateDifficultyButtons();
            updateDifficultyHint();
            refreshLevelGrid();
        });
    }

    updateDifficultyButtons();
    updateDifficultyHint();
    refreshLevelGrid();
</script>
    {% include "tutor/sounds_include.html" %}
</body>
</html>
