<!-- I made the level selection page, and I will connect the
level pages to it. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose a Level</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'tutor/style.css' %}">
</head>
<body>
    <main class="page">
        <h1>Keyboard Quest</h1>
        <p>Select a level</p>

        <section class="level-grid">
            {% for level in levels %}
                <a
                    href="{% url 'level_page' level.number %}"
                    data-level="{{ level.number }}"
                    data-done-url="{% url 'level_complete' level.number %}"
                    class="level-box level-{{ level.status }} {% if level.number == 10 %}level-10{% endif %} level-pick"
                >
                    <span>{{ level.number }}</span>
                </a>
            {% endfor %}
        </section>
    </main>

<!-- Checks which levels are complete and updates their buttons. -->

<script>
    var picks = document.querySelectorAll(".level-pick");
    for (var i = 0; i < picks.length; i++) {
        var link = picks[i];
        var num = link.getAttribute("data-level");
        if (sessionStorage.getItem("level_result_" + num)) {
            link.setAttribute("href", link.getAttribute("data-done-url"));
        }
    }
</script>
</body>
</html>
