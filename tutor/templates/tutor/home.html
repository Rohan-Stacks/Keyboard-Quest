<!-- I redesigned the home page into a cleaner menu with
Start Typing, Settings, and About options (settings doesnt do anything yet
 but planed to add an option to turn off accuracy, wpm, font color, and what not-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyboard Quest</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'tutor/style.css' %}">
</head>
<body>
    <main class="page">
        <section class="hero">
            <p class="eyebrow">Software Engineering Typing Tutor</p>
            <h1>Keyboard Quest</h1>
            <p class="subtitle">
                By Rohan Nalakonda
            </p>
        </section>

        <nav class="menu-grid" aria-label="Main menu">
            <a class="menu-card menu-start" href="{% url 'levels' %}">
                <span class="menu-title">Start Typing</span>
                <span class="menu-text">Go to level selection</span>
            </a>

            <button class="menu-card menu-settings" type="button" disabled>
                <span class="menu-title">Settings</span>
                <span class="menu-text">Coming soon</span>
            </button>

            <a class="menu-card menu-about" href="{% url 'about' %}">
                <span class="menu-title">About</span>
                <span class="menu-text">Mission and contact</span>
            </a>
        </nav>
    </main>
</body>
</html>
